name: QuickMart Backend Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'quickmart-backend/**'
      - '.github/workflows/quickmart-tests.yml'
  workflow_dispatch:

permissions:
  contents: write
  checks: write
  pull-requests: write

jobs:
  quickmart-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - "27018:27017"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Start QuickMart Backend
        working-directory: quickmart-backend
        run: |
          nohup mvn spring-boot:run &
          echo "Waiting for Spring Boot to start..."
          sleep 25
          curl --retry 10 --retry-delay 3 --retry-connrefused \
            http://localhost:8085/api/cash/store/STORE-001 || true

      - name: Run Karate Tests
        working-directory: quickmart-backend
        run: mvn test -Dtest=QuickMartTestRunner

      # ✅ Pull previous Allure history (for trends)
      - name: Get Allure history
        if: always()
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      # ✅ Generate Allure report (FIXED PATH)
      - name: Build Allure Report
        if: always()
        uses: simple-elf/allure-report-action@v1.7
        with:
          allure_results: quickmart-backend/target/allure-results
          allure_history: allure-history
          gh_pages: gh-pages
          keep_reports: 10

      # ✅ Deploy to GitHub Pages (UPDATED VERSION)
      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      # ✅ Keep Karate HTML as artifact
      - name: Upload Karate HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karate-html-report-${{ github.run_number }}
          path: quickmart-backend/target/karate-reports/