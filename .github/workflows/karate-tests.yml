name: Karate API & E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        default: ci
        type: choice
        options: [ci, staging]
      tags:
        description: Karate tags
        default: '@regression'

jobs:
  karate-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      wiremock:
        image: wiremock/wiremock:latest
        ports: ['8090:8080']

      zookeeper:
        image: confluentinc/cp-zookeeper:7.4.0
        env:
          ZOOKEEPER_CLIENT_PORT: 2181

      kafka:
        image: confluentinc/cp-kafka:7.4.0
        ports: ['9092:9092']
        env:
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'

      mongodb:
        image: mongo:6.0
        ports: ['27017:27017']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Wait for services ready
        run: |
          timeout 60 bash -c 'until nc -z localhost 9092; do sleep 2; done'
          timeout 30 bash -c 'until curl -s http://localhost:8090/__admin/; do sleep 2; done'

      - name: Load WireMock stubs
        run: |
          for f in src/test/resources/stubs/*.json; do
            curl -s -X POST http://localhost:8090/__admin/mappings \
              -H "Content-Type: application/json" -d @"$f"
          done

      - name: Run Smoke Tests
        run: mvn test -Dkarate.env=ci -Dkarate.options="--tags @smoke"

      - name: Run Regression Tests
        if: success()
        run: mvn test -Dkarate.env=ci

      - name: Upload Karate Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: karate-report-${{ github.run_number }}
          path: target/karate-reports/

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/surefire-reports/*.xml