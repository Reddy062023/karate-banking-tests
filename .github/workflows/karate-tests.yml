name: Karate API & E2E Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'docker-compose.yml'
      - '.github/workflows/karate-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'pom.xml'
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  checks: write
  pull-requests: write

jobs:
  karate-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      wiremock:
        image: wiremock/wiremock:latest
        ports: ['8090:8080']

      zookeeper:
        image: confluentinc/cp-zookeeper:7.4.0
        ports:
          - '2181:2181'
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
          ZOOKEEPER_TICK_TIME: 2000

      kafka:
        image: confluentinc/cp-kafka:7.4.0
        ports:
          - '9092:9092'
        env:
          KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: '1'
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: '1'
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: '1'
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: '0'
          KAFKA_LOG_RETENTION_MS: '60000'

      mongodb:
        image: mongo:6.0
        ports:
          - '27017:27017'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Wait for services ready
        run: |
          echo "Waiting for WireMock..."
          timeout 60 bash -c 'until curl -s http://localhost:8090/__admin/; do sleep 2; done'
          echo "WireMock ready!"
          echo "Waiting for Kafka..."
          timeout 90 bash -c 'until nc -z localhost 9092; do sleep 2; done'
          echo "Kafka ready!"
          sleep 5
          echo "Waiting for MongoDB..."
          timeout 30 bash -c 'until nc -z localhost 27017; do sleep 2; done'
          echo "MongoDB ready!"

      - name: Load WireMock stubs
        run: |
          for f in src/test/resources/stubs/*.json; do
            curl -s -X POST http://localhost:8090/__admin/mappings \
              -H "Content-Type: application/json" -d @"$f"
            echo "Loaded stub: $f"
          done

      - name: Seed MongoDB test data
        run: |
          echo "Seeding MongoDB with test data..."
          docker run --rm --network host mongo:6.0 mongosh \
            "mongodb://localhost:27017/banking_events" \
            --eval "db.order_events.insertMany([{orderId:'ORD-1001',customerId:'CUST-01',eventType:'ORDER_CREATED',status:'CREATED',totalAmount:1149.98,currency:'USD',items:[{productId:'PROD-001',name:'Laptop',qty:1,price:999.99},{productId:'PROD-002',name:'Headphones',qty:1,price:149.99}],customer:{name:'Alice Johnson',email:'alice@bank.com',tier:'GOLD'},payment:{method:'CREDIT_CARD',last4:'4242',gateway:'Stripe'},kafka:{topic:'order-events',partition:0,offset:1024},schemaVersion:1},{orderId:'ORD-1001',customerId:'CUST-01',eventType:'ORDER_PAID',status:'PAID',totalAmount:1149.98,payment:{method:'CREDIT_CARD',gatewayRef:'STRIPE-AAA'},kafka:{topic:'payment-events',partition:0,offset:501},schemaVersion:1},{orderId:'ORD-1002',customerId:'CUST-02',eventType:'ORDER_CREATED',status:'CREATED',totalAmount:299.99,items:[{productId:'PROD-003',name:'Desk Chair',qty:1,price:299.99}],customer:{name:'Bob Smith',email:'bob@bank.com',tier:'STANDARD'},kafka:{topic:'order-events',partition:1,offset:1025},schemaVersion:1},{orderId:'ORD-FAIL-001',customerId:'CUST-99',eventType:'ORDER_PAYMENT_FAILED',status:'PAYMENT_FAILED',totalAmount:500.00,kafka:{topic:'order-events-dlq',partition:0,offset:1},errorDetail:{code:'CARD_DECLINED',message:'Insufficient funds'},schemaVersion:1}])"
          echo "MongoDB seeded!"

      - name: Run All Tests
        run: mvn test -Dkarate.env=ci

      - name: Upload Karate Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: karate-report-${{ github.run_number }}
          path: target/karate-reports/

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: target/allure-results
          allure_history: allure-history
          gh_pages: gh-pages
          keep_reports: 10

      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: target/surefire-reports/*.xml